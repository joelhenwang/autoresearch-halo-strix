description = "Baseline: 8-layer GPT with ReLU² MLP, RoPE, softcap, MuonAdamW"

[model]
vocab_size = 50257
sequence_len = 2048
n_layer = 8
n_embd = 768
n_head = 6
n_kv_head = 6
head = "softcap"
softcap_value = 15.0
use_residual_lambdas = true
use_x0_connection = true
block_pattern = "SSSL"

[optimizer]
kind = "muon_adamw"
embedding_lr = 0.6
unembedding_lr = 0.004
matrix_lr = 0.04
scalar_lr = 0.5
weight_decay = 0.2
adam_betas = [0.8, 0.95]
warmup_ratio = 0.0
warmdown_ratio = 0.5
final_lr_frac = 0.0

[training]
time_budget = 900
total_batch_size = 524288
device_batch_size = 128
seed = 42
dtype = "bfloat16"
compile = true

[data]
parquet_dir = ""  # SET THIS to your parquet directory path
text_column = "text"
val_ratio = 0.1
eval_tokens = 20971520
preload = true
